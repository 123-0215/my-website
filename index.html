<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的程序员名片</title>
    <style>
        /* ---------- 全局重置 & 背景 ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', '微软雅黑', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ---------- 白色主卡片（就像一张放在桌上的A4纸） ---------- */
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px 50px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* 鼠标悬停时卡片“浮起来”的特效 */
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4);
        }

        /* ---------- 头像（圆形照片） ---------- */
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: #ddd;
            margin: 0 auto 20px;
            /* 这里用了一个在线占位图服务，会自动生成一张随机的程序员头像 */
            background-image: url('https://i.pravatar.cc/300?img=11');
            background-size: cover;
            background-position: center;
            border: 5px solid #667eea;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        /* ---------- 文字样式 ---------- */
        h1 {
            font-size: 32px;
            color: #2d3436;
            margin-bottom: 5px;
        }

        .title {
            font-size: 18px;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .bio {
            color: #636e72;
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 25px;
        }

        /* ---------- 社交按钮组（像三颗糖豆） ---------- */
        .links {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            border-radius: 50px;
            background: #f1f2f6;
            color: #2d3436;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        /* 不同按钮的专属颜色 */
        .btn-github {
            background: #24292e;
            color: white;
        }
        .btn-github:hover {
            background: #000;
            transform: scale(1.05);
        }

        .btn-blog {
            background: #667eea;
            color: white;
        }
        .btn-blog:hover {
            background: #5a6fd6;
            transform: scale(1.05);
        }

        .btn-email {
            background: #fd79a8;
            color: white;
        }
        .btn-email:hover {
            background: #e8437a;
            transform: scale(1.05);
        }

        /* ---------- 底部装饰 ---------- */
        .footer {
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }
    </style>
</head>
<!-- 以下是今天新增的“大脑”部分 -->
<script>
    // 【1. 页面一打开，自动执行“回忆”程序】
    // 这相当于网站一睁眼，就去翻自己的“小笔记本”，看看之前记了啥。
    window.onload = function() {
        // 去笔记本里找找有没有叫 'userName' 的记录
        let savedName = localStorage.getItem('userName');
        
        // 如果找到了（说明是老顾客）
        if (savedName) {
            // 直接把标题改成“你好，XXX！欢迎光临！”
            document.getElementById('greeting').innerHTML = '你好，' + savedName + '！欢迎光临！';
        }
    }

    // 【2. 这是“自定义打招呼”函数（升级版）】
    function customGreeting() {
        // 弹出输入框，让用户输入
        let userName = prompt('请输入你的名字：');

        // 判断：如果用户真的打了字（而且不是空格）
        if (userName && userName.trim() !== '') {
            // 【核心升级】把这个名字写进浏览器的“小笔记本”（永久保存）
            localStorage.setItem('userName', userName);
            
            // 同时把网页上的标题改掉
            document.getElementById('greeting').innerHTML = '你好，' + userName + '！欢迎光临！';
        } else {
            // 如果用户点了取消或者没打字
            alert('名字不能为空哦，再试一次吧！');
        }
    }

    // 【3. 新增功能：清除记忆（给用户反悔的权利）】
    function forgetMe() {
        // 从笔记本里把名字记录撕掉
        localStorage.removeItem('userName');
        // 把网页上的标题恢复成出厂设置
        document.getElementById('greeting').innerHTML = '你好，我是 123-0215';
        alert('已清除记忆！下次刷新页面，网站就不认识你了。');
    }
</script>
<body>

    <!-- 主卡片 -->
    <div class="card">

        <!-- 头像占位图（pravatar.cc 随机头像） -->
        <div class="avatar"></div>

        <h1 id="greeting">你好，我是 123-0215</h1>
        <p class="title">🚀 前端开发练习生</p>

        <p class="bio">
            我刚刚学会了 <strong>Git</strong> 和 <strong>GitHub Pages</strong>，<br>
            这是我亲手搭建并上线的小名片。每天进步一点点！
        </p>

        <!-- 三个按钮 -->
        <div class="links">
            <a href="#" class="btn btn-github">🐙 GitHub</a>
            <a href="#" class="btn btn-blog" onclick="document.getElementById('greeting').innerHTML = '你好，编程大牛！🚀'">📝 点我改名</a>
            <a href="#" class="btn btn-email" onclick="alert('嘿嘿，你好呀！很高兴认识你！')">✉️ 联系我</a>
            <!-- 这是新增的“清除记忆”按钮（红色） -->
            <a href="#" class="btn" style="background:#e17055; color:white;" onclick="forgetMe()">🧹 清除记忆</a>
        </div>
<!-- 这是新增的“自定义称呼”按钮 -->
<a href="#" class="btn" style="background:#00b894; color:white;" onclick="customGreeting()">✏️ 自定义称呼</a>
    </div>

    <div class="footer">
        © 2026 我的第一个线上名片 · 自豪地运行在 GitHub Pages 上
    </div>

</body>
</html>
