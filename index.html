<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的程序员名片</title>
    <style>
        /* ---------- 全局重置 & 背景 ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', '微软雅黑', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ---------- 白色主卡片（就像一张放在桌上的A4纸） ---------- */
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px 50px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* 鼠标悬停时卡片“浮起来”的特效 */
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4);
        }

        /* ---------- 头像（圆形照片） ---------- */
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: #ddd;
            margin: 0 auto 20px;
            /* 这里用了一个在线占位图服务，会自动生成一张随机的程序员头像 */
            background-image: url('https://i.pravatar.cc/300?img=11');
            background-size: cover;
            background-position: center;
            border: 5px solid #667eea;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        /* ---------- 文字样式 ---------- */
        h1 {
            font-size: 32px;
            color: #2d3436;
            margin-bottom: 5px;
        }

        .title {
            font-size: 18px;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .bio {
            color: #636e72;
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 25px;
        }

        /* ---------- 社交按钮组（像三颗糖豆） ---------- */
        .links {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            border-radius: 50px;
            background: #f1f2f6;
            color: #2d3436;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        /* 不同按钮的专属颜色 */
        .btn-github {
            background: #24292e;
            color: white;
        }
        .btn-github:hover {
            background: #000;
            transform: scale(1.05);
        }

        .btn-blog {
            background: #667eea;
            color: white;
        }
        .btn-blog:hover {
            background: #5a6fd6;
            transform: scale(1.05);
        }

        .btn-email {
            background: #fd79a8;
            color: white;
        }
        .btn-email:hover {
            background: #e8437a;
            transform: scale(1.05);
        }

        /* ---------- 底部装饰 ---------- */
        .footer {
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }
    </style>
</head>
<!-- 以下是今天新增的“大脑”部分 -->

<script>
    // ============================================
    // 第一部分：永久记忆功能（你之前写的，原封不动）
    // ============================================
    window.onload = function() {
        let savedName = localStorage.getItem('userName');
        if (savedName) {
            document.getElementById('greeting').innerHTML = '你好，' + savedName + '！欢迎光临！';
        }
    }

    function customGreeting() {
        let userName = prompt('请输入你的名字：');
        if (userName && userName.trim() !== '') {
            localStorage.setItem('userName', userName);
            document.getElementById('greeting').innerHTML = '你好，' + userName + '！欢迎光临！';
        } else {
            alert('名字不能为空哦，再试一次吧！');
        }
    }

    function forgetMe() {
        localStorage.removeItem('userName');
        document.getElementById('greeting').innerHTML = '你好，我是 123-0215';
        alert('已清除记忆！下次刷新页面，网站就不认识你了。');
    }

    // ============================================
    // 第二部分：数据仓库（专门用来存放获取到的项目列表）
    // ============================================
    // 这是一个“全局变量”，就像一个大箱子，专门用来存放从 GitHub 搬来的书。
    // 这样不管怎么排序，原始数据都在，随时可以重新排列。
    let allRepos = [];

    // ============================================
    // 第三部分：装修队（专门负责把数据变成卡片）
    // ============================================
    // 这个函数只做一件事：给我一堆数据（repos），我就把它们画成卡片。
    // 以后只要调用它，传入不同的数据，卡片就会自动刷新。
    function renderRepos(repos) {
        const container = document.getElementById('repo-container');
        
        // 如果传进来的数据是空的，或者没有项目
        if (!repos || repos.length === 0) {
            container.innerHTML = '<p style="color: #999; text-align: center;">😅 这个用户还没有公开项目。</p>';
            return;
        }

        // 开始“装修”（生成卡片 HTML）
        let repoHtml = '<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">';
        
        repos.forEach(repo => {
            repoHtml += `
                <div style="background: #f8f9fa; padding: 15px; border-radius: 12px; border-left: 4px solid #6c5ce7;">
                    <a href="${repo.html_url}" target="_blank" style="font-weight: bold; color: #2d3436; text-decoration: none; font-size: 16px;">
                        📁 ${repo.name}
                    </a>
                    <p style="font-size: 14px; color: #636e72; margin: 8px 0 0 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                        ${repo.description || '这个项目还没有描述'}
                    </p>
                    <div style="margin-top: 10px; font-size: 12px; color: #b2bec3;">
                        ⭐ ${repo.stargazers_count} · 🍴 ${repo.forks_count}
                    </div>
                    <div style="font-size: 12px; color: #6c5ce7; margin-top: 4px;">💻 ${repo.language || '未知'}</div>
                </div>
            `;
        });

        repoHtml += '</div>';
        container.innerHTML = repoHtml;
    }

    // ============================================
    // 第四部分：打电话给 GitHub（获取数据）
    // ============================================
    async function fetchMyRepos() {
        const container = document.getElementById('repo-container');
        container.innerHTML = '<p style="color: #666; text-align: center;">⏳ 正在连接 GitHub，获取项目清单...</p>';

        // 【注意】把 "123-0215" 换成你自己的 GitHub 用户名！
        const apiUrl = 'https://api.github.com/users/123-0215/repos?sort=updated&per_page=6';
        
        try {
            const response = await fetch(apiUrl);
            if (!response.ok) {
                throw new Error(`GitHub 说: 找不到这个用户 (错误码: ${response.status})`);
            }
            const repos = await response.json();

            // 【关键步骤】把拿到的数据存进全局变量 allRepos 里
            allRepos = repos;
            
            // 调用“装修队”，把数据画成卡片
            renderRepos(allRepos);

        } catch (error) {
            console.error('获取仓库失败:', error);
            container.innerHTML = `<p style="color: #e17055; text-align: center;">❌ 哎呀，加载失败了: ${error.message}。请稍后再试！</p>`;
        }
    }
    // ============================================
    // 第六部分：万能导航员（查询任意用户）
    // ============================================
    
    // 核心函数：根据用户名查询 GitHub 项目
    async function queryUserRepos() {
        // 1. 获取用户输入框的内容
        const input = document.getElementById('github-username-input');
        let username = input.value.trim(); // trim() 去掉首尾空格
        
        // 2. 检查用户名是否为空
        if (!username) {
            alert('⚠️ 请先输入一个 GitHub 用户名！');
            return;
        }

        // 3. 显示状态：正在查询
        const status = document.getElementById('query-status');
        status.innerHTML = `⏳ 正在查询用户 <strong>${username}</strong> 的项目...`;
        status.style.color = '#6c5ce7';

        // 4. 清空之前的数据（避免新旧数据混合显示）
        allRepos = [];
        const container = document.getElementById('repo-container');
        container.innerHTML = '<p style="color: #999; text-align: center;">⏳ 正在加载...</p>';

        // 5. 构造 API 地址（这次把用户名动态拼进去）
        const apiUrl = `https://api.github.com/users/${username}/repos?sort=updated&per_page=12`;

        try {
            const response = await fetch(apiUrl);

            // 6. 处理 HTTP 错误（比如用户不存在）
            if (response.status === 404) {
                status.innerHTML = `❌ 找不到用户 <strong>${username}</strong>，请检查拼写！`;
                status.style.color = '#e17055';
                container.innerHTML = `<p style="color: #e17055; text-align: center;">😅 用户 "${username}" 不存在，请重新输入。</p>`;
                return;
            }

            if (!response.ok) {
                throw new Error(`GitHub 返回错误码: ${response.status}`);
            }

            const repos = await response.json();

            // 7. 如果用户没有任何公开项目
            if (repos.length === 0) {
                status.innerHTML = `📭 用户 <strong>${username}</strong> 没有公开项目。`;
                status.style.color = '#fdcb6e';
                container.innerHTML = `<p style="color: #999; text-align: center;">😅 用户 "${username}" 还没有公开项目。</p>`;
                return;
            }

            // 8. 成功获取数据！
            allRepos = repos;
            renderRepos(allRepos);

            // 9. 更新状态提示
            status.innerHTML = `✅ 成功加载 <strong>${username}</strong> 的 ${repos.length} 个项目`;
            status.style.color = '#00b894';

            // 10. 额外显示当前查询的用户名（在卡片上方）
            const userInfo = document.createElement('div');
            userInfo.id = 'current-user-display';
            userInfo.style.cssText = `
                text-align: center; 
                font-size: 14px; 
                color: #6c5ce7; 
                background: #f0edff; 
                padding: 8px 16px; 
                border-radius: 20px; 
                display: inline-block;
                margin: 0 auto 15px;
                width: auto;
            `;
            userInfo.innerHTML = `👤 当前查询：<strong>${username}</strong>`;
            
            // 把用户名标签插入到容器前面
            const containerParent = container.parentNode;
            const oldUserDisplay = document.getElementById('current-user-display');
            if (oldUserDisplay) {
                oldUserDisplay.remove();
            }
            containerParent.insertBefore(userInfo, container);

        } catch (error) {
            // 如果网络出错
            console.error('查询失败:', error);
            status.innerHTML = `❌ 查询失败: ${error.message}`;
            status.style.color = '#e17055';
            container.innerHTML = `<p style="color: #e17055; text-align: center;">❌ 网络错误，请稍后再试。</p>`;
        }
    }

    // ============================================
    // 第七部分：清空功能（一键还原）
    // ============================================
    function clearAll() {
        // 1. 清空输入框
        const input = document.getElementById('github-username-input');
        input.value = '';
        
        // 2. 清空全局数据
        allRepos = [];
        
        // 3. 清空展示区
        const container = document.getElementById('repo-container');
        container.innerHTML = '<p style="color: #999; text-align: center;">💡 输入用户名后点击查询，即可看到该用户的 GitHub 项目</p>';
        
        // 4. 移除当前用户名显示
        const userDisplay = document.getElementById('current-user-display');
        if (userDisplay) {
            userDisplay.remove();
        }
        
        // 5. 重置状态提示
        const status = document.getElementById('query-status');
        status.innerHTML = '💡 输入 GitHub 用户名，点击查询即可看到该用户的公开项目';
        status.style.color = '#636e72';
    }

    // ============================================
    // 第八部分：修改原有的 fetchMyRepos 函数
    // （让它在点击“🚀 显示我的项目”时，也走新的查询逻辑）
    // ============================================
    // 把原来的 fetchMyRepos 改成这样：
    async function fetchMyRepos() {
        // 把输入框的内容设置为你的用户名，然后自动执行查询
        const input = document.getElementById('github-username-input');
        input.value = '123-0215'; // 改成你自己的用户名！
        await queryUserRepos();
    }
    // ============================================
    // 第五部分：排序功能（图书管理员的技能）
    // ============================================
    
    // 按星星数排序（从多到少）
    function sortByStars() {
        // 1. 复制一份原始数据（防止直接修改原数组，养成好习惯）
        const sorted = [...allRepos];
        
        // 2. 排序：比较两个项目的星星数，如果 a 的星星比 b 少，就把 a 往后挪
        sorted.sort((a, b) => b.stargazers_count - a.stargazers_count);
        
        // 3. 调用“装修队”重新绘制卡片
        renderRepos(sorted);
    }

    // 按项目名排序（字母顺序 A → Z）
    function sortByName() {
        // 1. 复制一份原始数据
        const sorted = [...allRepos];
        
        // 2. 排序：比较两个项目的名字（字符串比较）
        sorted.sort((a, b) => a.name.localeCompare(b.name));
        
        // 3. 调用“装修队”重新绘制卡片
        renderRepos(sorted);
    }

    // 按更新时间排序（最新的在前）—— 这是默认的排序方式
    function sortByRecent() {
        const sorted = [...allRepos];
        // 这里假设 GitHub 返回的 order 已经是最近更新的，但我们手动按 updated_at 排一下
        sorted.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));
        renderRepos(sorted);
    }
</script>
<body>
<!-- 新玩具：GitHub 项目展示器 -->
<hr style="margin: 30px 0; border: 1px solid #eee;">  <!-- 这是一条分割线，把名片和新功能分开 -->

<!-- ========== GitHub 项目查询台（新版本） ========== -->
<hr style="margin: 30px 0; border: 1px solid #eee;">

<h3 style="color:#2d3436;">📦 GitHub 项目查询</h3>

<!-- 查询面板（输入框 + 按钮） -->
<div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin: 15px 0;">
    <input 
        type="text" 
        id="github-username-input" 
        placeholder="输入 GitHub 用户名（如：octocat）" 
        style="flex: 1; min-width: 200px; padding: 12px 20px; border: 2px solid #dfe6e9; border-radius: 50px; font-size: 15px; outline: none; transition: 0.3s;"
        onfocus="this.style.borderColor='#6c5ce7'"
        onblur="this.style.borderColor='#dfe6e9'"
        onkeydown="if(event.key === 'Enter') queryUserRepos()"
    >
    <a href="#" class="btn" style="background:#6c5ce7; color:white; white-space:nowrap;" onclick="queryUserRepos()">🔍 查询</a>
    <a href="#" class="btn" style="background:#00b894; color:white; white-space:nowrap;" onclick="loadMyRepos()">🏠 我的项目</a>
    <a href="#" class="btn" style="background:#e17055; color:white; white-space:nowrap;" onclick="clearAll()">🧹 清空</a>
</div>

<!-- 状态提示栏（显示“正在查询 xxx”或“查询失败”） -->
<div id="query-status" style="font-size: 14px; color: #636e72; text-align: center; margin-bottom: 15px;">
    💡 输入用户名，点击查询即可看到该用户的公开项目
</div>

<!-- 项目展示容器（卡片们就显示在这里） -->
<div id="repo-container">
    <p style="color: #999; text-align: center;">✨ 试试搜索一个 GitHub 用户名吧</p>
</div>

<!-- 排序工具栏（保持你原有的三个排序按钮） -->
<div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 15px;">
    <a href="#" class="btn" style="background:#fd79a8; color:white; padding:8px 20px; font-size:14px;" onclick="sortByStars()">⭐ 按热度排序</a>
    <a href="#" class="btn" style="background:#00b894; color:white; padding:8px 20px; font-size:14px;" onclick="sortByName()">📛 按名称排序</a>
    <a href="#" class="btn" style="background:#fdcb6e; color:#2d3436; padding:8px 20px; font-size:14px;" onclick="sortByRecent()">🕒 按最近更新</a>
</div>
    <!-- 主卡片 -->
    <div class="card">

        <!-- 头像占位图（pravatar.cc 随机头像） -->
        <div class="avatar"></div>

        <h1 id="greeting">你好，我是 123-0215</h1>
        <p class="title">🚀 前端开发练习生</p>
<!-- 排序控制台（图书管理员的工具） -->
<div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 10px;">
    <a href="#" class="btn" style="background:#fd79a8; color:white; padding:8px 20px;" onclick="sortByStars()">⭐ 按热度排序</a>
    <a href="#" class="btn" style="background:#00b894; color:white; padding:8px 20px;" onclick="sortByName()">📛 按名称排序</a>
    <a href="#" class="btn" style="background:#fdcb6e; color:#2d3436; padding:8px 20px;" onclick="sortByRecent()">🕒 按最近更新</a>
</div>
        <p class="bio">
            我刚刚学会了 <strong>Git</strong> 和 <strong>GitHub Pages</strong>，<br>
            这是我亲手搭建并上线的小名片。每天进步一点点！
        </p>

        <!-- 三个按钮 -->
        <div class="links">
            <a href="#" class="btn btn-github">🐙 GitHub</a>
            <a href="#" class="btn btn-blog" onclick="document.getElementById('greeting').innerHTML = '你好，编程大牛！🚀'">📝 点我改名</a>
            <a href="#" class="btn btn-email" onclick="alert('嘿嘿，你好呀！很高兴认识你！')">✉️ 联系我</a>
            <!-- 这是新增的“清除记忆”按钮（红色） -->
            <a href="#" class="btn" style="background:#e17055; color:white;" onclick="forgetMe()">🧹 清除记忆</a>
        </div>
<!-- 这是新增的“自定义称呼”按钮 -->
<a href="#" class="btn" style="background:#00b894; color:white;" onclick="customGreeting()">✏️ 自定义称呼</a>
    </div>

    <div class="footer">
        © 2026 我的第一个线上名片 · 自豪地运行在 GitHub Pages 上
    </div>

</body>
</html>
